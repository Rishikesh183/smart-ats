ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (via Anthropic API) in the offline pre-computation phase only:
  Claude scores the top-500 FAISS-retrieved candidates against the JD in batches
  of 5 (approx. 100 API calls total). No LLM calls occur during the ranking step.
  The ranking step (rank.py) is fully local: FAISS cosine similarity + rule-based
  feature scoring (skill match, behavioral signals, experience, education, title
  alignment) combined with pre-computed Claude scores loaded from disk.
  Claude was also used as a development tool for architecture discussion and code review.

methodology_summary: |
  Two-phase system:

  Phase 1 — Pre-computation (offline, ~90 min):
  All 100K candidate profiles are embedded with sentence-transformers
  (all-MiniLM-L6-v2) and stored in a FAISS IndexFlatIP for cosine similarity.
  The top-500 FAISS candidates for the JD are then scored by Claude
  (claude-3-5-haiku) in batches of 5, producing a structured fit-score + reasoning
  stored in artifacts/claude_scores.jsonl.

  Phase 2 — Ranking (< 5 min, no network):
  FAISS retrieves top candidates for the JD. Final score combines:
    55% Claude pre-score (when available) + 45% rule-based features
    Rule-based: skill match (proficiency × duration × endorsements),
    behavioral signals (response rate, recency, github, assessments),
    experience (years × product-company bonus, consulting penalty),
    education tier, title-role alignment multiplier.
  Honeypots (impossible profiles) and pure-consulting careers are zeroed out.
  Behavioral twin trap: unavailable candidates (inactive > 6 months, low response
  rate) are down-weighted via the behavioral score component.
  Title mismatch trap: Marketing Manager / Accountant with AI keywords get a
  0.3× multiplier regardless of skills listed.

